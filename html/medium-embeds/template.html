<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medium Embed Template</title>
    <style>
        /* Basic reset for embedding */
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: transparent; /* Allows Medium's background to show through if supported */
            color: #333;
            overflow: hidden; /* Prevent scrollbars in iframe if possible */
        }
        
        /* Your embed styles here */
        .embed-container {
            padding: 20px;
            text-align: center;
        }

        .embed-title {
            font-size: 1.5rem;
            margin-bottom: 10px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="embed-container">
        <h1 class="embed-title">My Interactive Content</h1>
        <p>This is a template for embedding HTML content seamlessly into a Medium article.</p>
        <!-- Add your interactive visualization, neural network, or black hole here -->
    </div>
</body>
</html>
